name: Claude Code

on:
  issues:
    types: [opened]   # labeled は併発防止のため除外
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash(npm*),Bash(npx*),Bash(node*),Bash(yarn*),Bash(pnpm*),Bash(uv*),Bash(python*),Bash(python3*),Bash(pip*),Bash(ruff*),Bash(make*)"

      - name: Auto-create PR (if claude branch exists)
        id: pr-create
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE='${{ github.event.issue.title }}'
          # claude-code-action 終了後は git credential が revoke 済みのため
          # gh API 経由でブランチを探す (git fetch を避ける)
          BRANCH=$(gh api "repos/${{ github.repository }}/branches" --paginate \
            --jq ".[] | select(.name | startswith(\"claude/issue-${ISSUE_NUM}-\")) | .name" \
            | head -1)
          if [ -z "$BRANCH" ]; then
            echo "No claude branch for issue #${ISSUE_NUM}, skipping PR creation"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found branch: $BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUM}")
          PR_NUM=$(echo "$PR_URL" | rev | cut -d/ -f1 | rev)
          echo "Created PR #${PR_NUM} ($PR_URL)"
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Auto-merge (if labeled)
        if: |
          github.event_name == 'issues' &&
          contains(github.event.issue.labels.*.name, 'auto-merge') &&
          steps.pr-create.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          PR_NUM="${{ steps.pr-create.outputs.pr_number }}"
          echo "Enabling auto-merge for PR #${PR_NUM} (squash + delete branch, after CI)"
          # --auto: GitHub native auto-merge. CI 通過後に自動で squash merge + branch 削除
          # Issue close は merge イベント発火後に close-issue-on-merge ジョブが処理する
          gh pr merge "$PR_NUM" --auto --squash --delete-branch

  close-issue-on-merge:
    # PR が merge されたら、PR body の "Closes #N" から Issue を探して閉じる
    # GitHub Actions が作成した PR は "Closes #N" の auto-link が効かないため明示的にクローズする
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Close linked issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -e
          PR_NUM="${{ github.event.pull_request.number }}"
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oE 'Closes #[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          if [ -n "$ISSUE_NUM" ]; then
            echo "Closing issue #${ISSUE_NUM} (linked from PR #${PR_NUM})"
            gh issue close "$ISSUE_NUM" --repo "${{ github.repository }}" --comment "Auto-resolved by PR #${PR_NUM}"
          else
            echo "No 'Closes #N' found in PR body; skipping issue close"
          fi
