name: Claude Code

# このファイルを各リポの .github/workflows/claude.yml にコピーして使う。
# ロジックは MNML-LLC/.github の claude-reusable.yml で一元管理。

on:
  issues:
    types: [opened]
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  claude-code:
    uses: MNML-LLC/.github/.github/workflows/claude-reusable.yml@main
    secrets: inherit