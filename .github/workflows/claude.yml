name: Claude Code

on:
  issues:
    types: [opened]   # labeled は併発防止のため除外
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash(npm*),Bash(npx*),Bash(node*),Bash(yarn*),Bash(pnpm*),Bash(uv*),Bash(python*),Bash(python3*),Bash(pip*),Bash(ruff*),Bash(make*)"

      - name: Auto-create PR (if claude branch exists)
        id: pr-create
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE='${{ github.event.issue.title }}'
          # claude-code-action 終了後は git credential が revoke 済みのため
          # gh API 経由でブランチを探す (git fetch を避ける)
          BRANCH=$(gh api "repos/${{ github.repository }}/branches" --paginate \
            --jq ".[] | select(.name | startswith(\"claude/issue-${ISSUE_NUM}-\")) | .name" \
            | head -1)
          if [ -z "$BRANCH" ]; then
            echo "No claude branch for issue #${ISSUE_NUM}, skipping PR creation"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found branch: $BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUM}")
          PR_NUM=$(echo "$PR_URL" | rev | cut -d/ -f1 | rev)
          echo "Created PR #${PR_NUM} ($PR_URL)"
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Auto-merge (if labeled)
        if: |
          github.event_name == 'issues' &&
          contains(github.event.issue.labels.*.name, 'auto-merge') &&
          steps.pr-create.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          PR_NUM="${{ steps.pr-create.outputs.pr_number }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          echo "Merging PR #${PR_NUM} (squash + delete branch)"
          # branch protection 不要のリポなので即マージ
          # CIあるリポでは --auto に変更
          gh pr merge "$PR_NUM" --squash --delete-branch
          # GitHub Actions が作ったPRは "Closes #N" の auto-link が効かないため明示的にクローズ
          gh issue close "$ISSUE_NUM" --comment "Auto-resolved by PR #${PR_NUM}"
